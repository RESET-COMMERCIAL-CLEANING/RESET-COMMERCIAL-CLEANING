name: Deploy to GitHub Pages

on:
  push:
    branches: [main, deploy-*, checkpoint-*]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyDB7h85_b3GxdPlmLHrm1iqgRYIpNSyesg
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: reset-commercial-cleaning.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: reset-commercial-cleaning
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: reset-commercial-cleaning.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 562251351172
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:562251351172:web:60925a004a26765b282ed1
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-4HM299ENG9
          NEXT_PUBLIC_ADMIN_EMAIL: admin@reset.com.au
          ADMIN_PASSWORD: Reset@Admin123!
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
